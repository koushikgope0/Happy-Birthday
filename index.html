<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Letter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 3D Heart Canvas -->
    <div id="love-canvas"></div>

    <!-- Click Instruction -->
    <div id="instructions">
        Click the heart ❤️
    </div>

    <!-- Scroll Instruction -->
    <div id="scroll-instruction" style="display:none;">
        Scroll Down ⬇️
    </div>

    <!-- Letter Container -->
    <div id="container">
        <div id="letter">
            <h1>Hii Shruti ❤️</h1>

            <p>
                Hii, Asha korchi tui eta puro ta porbi...
                <!-- (your full letter content stays here exactly same) -->
                <br><br>
                All the love,
            </p>
        </div>
    </div>

    <!-- Extra space for scrolling -->
    <div id="spacer"></div>

    <!-- Three.js CDN (MUST be before script.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Your Script -->
    <script src="script.js"></script>

</body>
</html>
